# Site settings
baseurl = "https://stardust-coder.github.io/myportfolio/"
languageCode = "en-us"
title = "Stardust's portfolio"
theme = "hugrid"
# Enter your tracking code to enable Google Analytics
googleAnalytics = "UA-XXXXXXXX-Y"

contentdir = "content"
datadir = "data"
layoutdir = "layouts"
publishdir = "docs"
canonifyurls = true

[params]
    # Meta
    title = "Stardust's portfolio"
    subtitle = "subtitle"
    author = "Stardust"
    description = "Hugrid - grid theme for Hugo with an expanding image preview."
    keywords = "Hugo, portfolio"

    # Body background color
    bodybgcolor = "#f9f9f9"

    # Preview container button text
    buttontext = "LINK TO DETAIL"

    # Footer text
    footertext = "Made by [Codrops](http://tympanus.net/codrops/2013/03/19/thumbnail-grid-with-expanding-preview/), [Hugo](http://gohugo.io) and [me](https://github.com/aerohub)"

    # add extra-css
    # custom_css = ['css/extra1.css', 'css/extra2.css']
